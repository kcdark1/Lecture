name: Desplegar en GitHub Pages

# Se ejecuta automáticamente cada vez que subes cambios a la rama main.
on:
  push:
    branches: [main]
  workflow_dispatch: # permite ejecutarlo a mano desde la pestaña "Actions"

permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues simultáneos
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Construir el sitio
        run: npm run build

      - name: Preparar artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
